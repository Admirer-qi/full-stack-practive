<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 text-primary"><i class="bi bi-check2-square"></i> Todo List</h1>
            <p class="lead">A simple dynamic todo list application with Python backend</p>
        </header>

        <div class="row">
            <div class="col-lg-8 mx-auto">
                <!-- Add Todo Form -->
                <div class="card shadow mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Todo</h5>
                    </div>
                    <div class="card-body">
                        <form id="todo-form">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title *</label>
                                <input type="text" class="form-control" id="title" placeholder="What needs to be done?" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="2" placeholder="Optional details..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus"></i> Add Todo
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Stats Card -->
                <div class="card shadow mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="bi bi-bar-chart"></i> Statistics</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-4">
                                <h3 id="total-count" class="text-primary">0</h3>
                                <p class="text-muted">Total Todos</p>
                            </div>
                            <div class="col-md-4">
                                <h3 id="active-count" class="text-success">0</h3>
                                <p class="text-muted">Active</p>
                            </div>
                            <div class="col-md-4">
                                <h3 id="completed-count" class="text-warning">0</h3>
                                <p class="text-muted">Completed</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Filter Buttons -->
                <div class="btn-group mb-4" role="group">
                    <button type="button" class="btn btn-outline-primary active" data-filter="all">
                        <i class="bi bi-list-ul"></i> All
                    </button>
                    <button type="button" class="btn btn-outline-success" data-filter="active">
                        <i class="bi bi-circle"></i> Active
                    </button>
                    <button type="button" class="btn btn-outline-warning" data-filter="completed">
                        <i class="bi bi-check-circle"></i> Completed
                    </button>
                </div>

                <!-- Todos List -->
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h5 class="mb-0"><i class="bi bi-list-task"></i> Your Todos</h5>
                    </div>
                    <div class="card-body">
                        <div id="todo-list" class="list-group">
                            <!-- Todos will be inserted here dynamically -->
                            <div id="no-todos" class="text-center py-5">
                                <i class="bi bi-clipboard-x display-1 text-muted"></i>
                                <h4 class="mt-3 text-muted">No todos yet</h4>
                                <p class="text-muted">Add your first todo using the form above!</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <footer class="mt-5 text-center text-muted">
                    <p>Dynamic Web Project - Todo List with Python Flask Backend</p>
                </footer>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
